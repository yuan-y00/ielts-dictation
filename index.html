<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Dictation Practice</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-inner">
                <h1 class="app-title">IELTS Dictation</h1>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Section tabs will be rendered by JS -->
            <nav class="section-tabs" id="section-tabs"></nav>

            <!-- Section info bar -->
            <div class="section-info" id="section-info">
                <div class="section-meta">
                    <span class="section-icon" id="section-icon">📝</span>
                    <h2 class="section-title" id="section-title">Simon Writing Task 2</h2>
                </div>
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="progress-text" id="progress-text">0/0</span>
                </div>
            </div>

            <!-- Controls bar -->
            <div class="controls-bar">
                <button class="btn btn-control" id="btn-auto" title="Auto-play mode">
                    <span class="btn-icon">▶️</span>
                    <span class="btn-label">Auto Dictation</span>
                </button>
                <button class="btn btn-control" id="btn-replay" title="Replay current sentence">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-label">Replay</span>
                </button>
                <button class="btn btn-control" id="btn-reset" title="Reset progress for current section">
                    <span class="btn-icon">🔃</span>
                    <span class="btn-label">Reset Progress</span>
                </button>
            </div>

            <!-- Cards container -->
            <div class="cards-container" id="cards-container">
                <!-- Cards rendered by JS -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>IELTS Dictation Practice · Built with care for serious IELTS learners</p>
        </footer>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/storage.js"></script>
    <script src="js/tts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
